name: Build and Release

on:
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: write

env:
  WX_VERSION: "3.3.1"

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Cache wxWidgets
      id: cache-wx
      uses: actions/cache@v4
      with:
        path: wxWidgets-3.3.1
        key: wxwidgets-${{ env.WX_VERSION }}-${{ hashFiles('CMakeLists.txt') }}

    - name: Download and extract wxWidgets source
      if: steps.cache-wx.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://github.com/wxWidgets/wxWidgets/releases/download/v${{ env.WX_VERSION }}/wxWidgets-${{ env.WX_VERSION }}.tar.bz2" -OutFile "wxWidgets.tar.bz2"
        7z x "wxWidgets.tar.bz2" -y
        7z x "wxWidgets.tar" -y
        Rename-Item "wxWidgets-${{ env.WX_VERSION }}" "wxWidgets-3.3.1"
        Remove-Item "wxWidgets.tar.bz2", "wxWidgets.tar" -ErrorAction SilentlyContinue

    - name: Build Application
      shell: pwsh
      run: |
        mkdir build -Force
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
        cmake --build . --config Release -j

    - name: Create archive
      shell: pwsh
      run: |
        mkdir release -Force
        copy build\Release\GO_MIDI!.exe release\
        copy "keymaps\燕云十六声默认键位.txt" release\
        cd release
        7z a -tzip ..\GO_MIDI-Windows.zip .

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: GO_MIDI-Windows.zip
        generate_release_notes: true
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
