name: Build and Release

on:
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: write

env:
  WX_VERSION: "3.3.1"

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Get CPU count
      id: cpu
      shell: pwsh
      run: echo "count=$((Get-CimInstance Win32_ComputerSystem).NumberOfLogicalProcessors)" >> $env:GITHUB_OUTPUT

    - name: Cache wxWidgets and build
      id: cache-wx
      uses: actions/cache@v4
      with:
        path: |
          wxWidgets-3.3.1
          build
        key: wxwidgets-${{ env.WX_VERSION }}-build-${{ hashFiles('CMakeLists.txt', 'src/**/*.cpp', 'src/**/*.h') }}
        restore-keys: |
          wxwidgets-${{ env.WX_VERSION }}-build-

    - name: Download and extract wxWidgets source
      if: steps.cache-wx.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://github.com/wxWidgets/wxWidgets/releases/download/v${{ env.WX_VERSION }}/wxWidgets-${{ env.WX_VERSION }}.tar.bz2" -OutFile "wxWidgets.tar.bz2"
        7z x "wxWidgets.tar.bz2" -y
        7z x "wxWidgets.tar" -y
        Remove-Item "wxWidgets.tar.bz2", "wxWidgets.tar" -ErrorAction SilentlyContinue

    - name: Configure and Build
      shell: pwsh
      run: |
        mkdir build -Force
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
        cmake --build . --config Release -j ${{ steps.cpu.outputs.count }}

    - name: Prepare Release Asset
      id: prepare
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        $version = $tag -replace '^v', ''
        $exeName = "GO_MIDI!_$version.exe"
        Copy-Item "build\Release\GO_MIDI!.exe" $exeName
        Write-Host "Output: $exeName"
        Add-Content -Path $env:GITHUB_OUTPUT -Value "exe_name=$exeName"

    - name: Generate Release Notes
      id: notes
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        $prevTag = git tag --list 'v*' --sort=-v:refname | Select-Object -First 1 -Skip 1
        if (-not $prevTag) { $prevTag = $tag }
        $log = git log "$prevTag..$tag" --no-merges --pretty="format:%s"
        $features = @(); $fixes = @(); $docs = @(); $refactors = @(); $other = @()
        foreach ($line in $log) {
            $clean = $line.Trim()
            if ($clean -match '^feat[:(]') { $features += ($clean -replace '^feat[:(]?\s*', '') }
            elseif ($clean -match '^fix[:(]') { $fixes += ($clean -replace '^fix[:(]?\s*', '') }
            elseif ($clean -match '^docs[:(]') { $docs += ($clean -replace '^docs[:(]?\s*', '') }
            elseif ($clean -match '^refactor[:(]') { $refactors += ($clean -replace '^refactor[:(]?\s*', '') }
            else { $other += $clean }
        }
        $body = @()
        $body += "# $tag Release Notes"; $body += ""
        if ($features) { $body += "## 🚀 新功能"; $body += ($features | ForEach-Object { "- $_" }); $body += "" }
        if ($fixes) { $body += "## 🐛 Bug Fixes"; $body += ($fixes | ForEach-Object { "- $_" }); $body += "" }
        if ($refactors) { $body += "## 🔧 重构"; $body += ($refactors | ForEach-Object { "- $_" }); $body += "" }
        if ($docs) { $body += "## 📄 文档"; $body += ($docs | ForEach-Object { "- $_" }); $body += "" }
        if ($other) { $body += "## 🧩 其他"; $body += ($other | ForEach-Object { "- $_" }); $body += "" }
        # 写入临时文件，供 body_path 使用
        $bodyText = ($body -join "`r`n")
        Set-Content -Path "$env:RUNNER_TEMP\release_body.md" -Value $bodyText

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ steps.prepare.outputs.exe_name }}
        body_path: ${{ runner.temp }}\release_body.md
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
