name: Build (Dev)

on:
  push:
    tags:
      - 'dev-v*'

permissions:
  contents: write

env:
  WX_VERSION: "3.3.1"

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Get CPU count
      id: cpu
      shell: pwsh
      run: echo "count=$((Get-CimInstance Win32_ComputerSystem).NumberOfLogicalProcessors)" >> $env:GITHUB_OUTPUT

    - name: Cache wxWidgets and build
      id: cache-wx
      uses: actions/cache@v4
      with:
        path: |
          wxWidgets-3.3.1
          build
        key: wxwidgets-${{ env.WX_VERSION }}-build-${{ hashFiles('CMakeLists.txt', 'src/**/*.cpp', 'src/**/*.h') }}
        restore-keys: |
          wxwidgets-${{ env.WX_VERSION }}-build-

    - name: Download and extract wxWidgets source
      if: steps.cache-wx.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://github.com/wxWidgets/wxWidgets/releases/download/v${{ env.WX_VERSION }}/wxWidgets-${{ env.WX_VERSION }}.tar.bz2" -OutFile "wxWidgets.tar.bz2"
        7z x "wxWidgets.tar.bz2" -y
        7z x "wxWidgets.tar" -y
        Remove-Item "wxWidgets.tar.bz2", "wxWidgets.tar" -ErrorAction SilentlyContinue

    - name: Configure and Build
      shell: pwsh
      run: |
        # Auto-detect VS generator
        $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        $vsPath = if (Test-Path $vsWhere) { & $vsWhere -latest -property installationPath } else { $null }
        if ($vsPath -and (Test-Path $vsPath)) {
          $year = [regex]::Match($vsPath, '(\d{4})').Groups[1].Value
          $gen = switch ($year) {
            "2022" { "Visual Studio 17 2022" }
            "2025" { "Visual Studio 17 2022" }
            "2026" { "Visual Studio 18 2026" }
            default { "Visual Studio 17 2022" }
          }
          Write-Host "Detected VS $year at $vsPath, using generator: $gen"
        } else {
          $gen = "Visual Studio 17 2022"
          Write-Host "vswhere not found, using default generator: $gen"
        }
        mkdir build -Force
        cd build
        cmake .. -G "$gen" -A x64 -DCMAKE_BUILD_TYPE=Release
        cmake --build . --config Release -j ${{ steps.cpu.outputs.count }}

    - name: Prepare Release Asset
      id: prepare
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        $version = $tag -replace '^dev-v', ''
        $exeName = "GO_MIDI!_${version}-dev.exe"
        Copy-Item "build\Release\GO_MIDI!.exe" $exeName
        Write-Host "Output: $exeName"
        Add-Content -Path $env:GITHUB_OUTPUT -Value "exe_name=$exeName"

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ steps.prepare.outputs.exe_name }}
        generate_release_notes: true
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}