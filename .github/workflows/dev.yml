name: Build (Dev)

on:
  push:
    tags:
      - 'dev-v*'

permissions:
  contents: write

env:
  WX_VERSION: "3.3.1"

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Cache wxWidgets source
      id: cache-wx-src
      uses: actions/cache@v4
      with:
        path: wxWidgets-src
        key: wxwidgets-src-${{ env.WX_VERSION }}

    - name: Download wxWidgets source
      if: steps.cache-wx-src.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://github.com/wxWidgets/wxWidgets/releases/download/v${{ env.WX_VERSION }}/wxWidgets-${{ env.WX_VERSION }}.tar.bz2" -OutFile "wxWidgets.tar.bz2"
        7z x "wxWidgets.tar.bz2" -y
        7z x "wxWidgets.tar" -o"wxWidgets-src" -y
        Move-Item "wxWidgets-src\wxWidgets-${{ env.WX_VERSION }}\*" "wxWidgets-src\" -Force
        Remove-Item "wxWidgets-src\wxWidgets-${{ env.WX_VERSION }}" -ErrorAction SilentlyContinue
        Remove-Item "wxWidgets.tar.bz2", "wxWidgets.tar" -ErrorAction SilentlyContinue

    - name: Prepare wxWidgets directory
      shell: pwsh
      run: |
        $wxSrcPath = Join-Path $PWD "wxWidgets-src"
        $wxLinkPath = Join-Path $PWD "wxWidgets-3.3.1"
        if (-not (Test-Path $wxLinkPath)) {
          New-Item -ItemType Junction -Path $wxLinkPath -Target $wxSrcPath | Out-Null
        }

    - name: Cache CMake build
      id: cache-cmake
      uses: actions/cache@v4
      with:
        path: |
          build/_deps
          build/wxWidgets
        key: cmake-build-${{ env.WX_VERSION }}-${{ hashFiles('CMakeLists.txt') }}

    - name: Build Application
      shell: pwsh
      run: |
        mkdir build -Force
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_BUILD_TYPE=Release
        cmake --build . --config Release -j

    - name: Prepare Release Asset
      id: prepare
      shell: pwsh
      run: |
        # Extract version from tag (dev-v1.0.0 -> 1.0.0)
        $tag = "${{ github.ref_name }}"
        $version = $tag -replace '^dev-v', ''
        $exeName = "GO_MIDI!_$version.exe"
        
        # Copy and rename exe
        Copy-Item "build\Release\GO_MIDI!.exe" $exeName
        
        Write-Host "Version: $version"
        Write-Host "Output: $exeName"
        
        # Set output for release step
        Add-Content -Path $env:GITHUB_OUTPUT -Value "exe_name=$exeName"

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ steps.prepare.outputs.exe_name }}
        generate_release_notes: true
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}